interface:
  display_name: "Lineage Course Skill"
  short_description: "Turn course materials into source-grounded AI skills."
  default_prompt: "Use lineage-skill to turn my course videos, PDFs, and notes into a source-grounded course expert skill."

# Trust surface:
#   - Reads only explicitly configured environment variables or explicit .env fallback files.
#   - Processes local course videos, audio, PDFs, notes, screenshots, and generated course artifacts.
#   - Calls the transcription, vision, text, and OCR endpoints configured by the user.
#   - Writes generated course artifacts and packaged skills under user-selected local directories.
#   - Does not commit course transcripts, screenshots, OCR outputs, or private course material.
